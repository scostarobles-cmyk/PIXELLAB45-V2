<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXELLAB45 eBook Studio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
      padding: 20px;
    }
    .navbar {
      background-color: #1e1e1e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-radius: 4px;
    }
    .nav-links a {
      color: #ffffff;
      text-decoration: none;
      margin-right: 15px;
    }
    .ai-card {
      background-color: #1e1e1e;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      border: 1px solid #333333;
    }
    input, select {
      display: block;
      width: 100%;
      max-width: 400px;
      padding: 10px;
      margin: 10px 0;
      background-color: #2a2a2a;
      border: 1px solid #444444;
      color: #ffffff;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .boton-accion {
      background-color: #007bff;
      color: #ffffff;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      display: inline-block;
      margin-top: 10px;
    }
    .boton-accion:active {
      background-color: #0056b3;
    }
    .scroll-box {
      background-color: #000000;
      padding: 10px;
      border-radius: 5px;
      min-height: 100px;
      font-family: monospace;
      border: 1px solid #333333;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <header class="navbar">
    <nav class="nav-links">
      <a href="#">🏠 Inicio</a>
      <a href="#">📚 eBook Studio</a>
    </nav>
  </header>

  <section class="ai-card">
    <h1>📚 PIXELLAB45 eBook Studio</h1>
    <p>AI Publishing Workstation</p>
    
    <input id="temaEbook" type="text" placeholder="Tema del eBook">
    <input id="autorEbook" type="text" placeholder="Autor">

    <h3>⚙️ Motores IA</h3>
    <button id="btnProyecto" class="boton-accion" onclick="crearProyecto()">📁 Crear Proyecto</button>
    
    <div id="monitorPIXELLAB" class="scroll-box">
      > Estado del sistema: Listo...
    </div>
  </section>

  <script>
    function crearProyecto() {
      const tema = document.getElementById('temaEbook').value || 'Sin tema';
      const monitor = document.getElementById('monitorPIXELLAB');
      monitor.innerHTML += `<br>[OK] Proyecto creado: "${tema}"`;
    }
  </script>

</body>
</html>
