<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXELLAB</title>
  
  <!-- Estilos originales -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER ORIGINAL -->
  <header class="header-principal">
    <div class="logo">
      <h1>PIXELLAB</h1>
    </div>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main-content">

    <!-- 1. MONITOR (Oculto temporalmente) -->
    <div id="seccion-monitor" class="modulo-monitor" style="display: none;">
      <div id="monitorPIXELLAB"></div>
    </div>

    <!-- 2. GENERADOR (Visible con tu estructura y estilos intactos) -->
    <section id="generador-container" class="modulo-generador">
      
      <div id="estadoEditorial"></div>
      <div id="errorEditorial"></div>

      <div class="formulario-editorial">
        <div class="campo-grupo">
          <label for="temaEbook">Tema del eBook:</label>
          <input type="text" id="temaEbook" placeholder="Tema principal">
        </div>

        <div class="campo-grupo">
          <label for="autorEbook">Autor:</label>
          <input type="text" id="autorEbook" placeholder="Autor">
        </div>

        <div class="grid-opciones">
          <div class="campo-grupo">
            <label for="paginasEbook">Páginas estimadas:</label>
            <input type="number" id="paginasEbook" value="100">
          </div>

          <div class="campo-grupo">
            <label for="idiomaEbook">Idioma:</label>
            <select id="idiomaEbook">
              <option value="Español" selected>Español</option>
              <option value="Inglés">Inglés</option>
              <option value="Portugués">Portugués</option>
            </select>
          </div>

          <div class="campo-grupo">
            <label for="tonoEbook">Tono:</label>
            <select id="tonoEbook">
              <option value="Profesional" selected>Profesional</option>
              <option value="Persuasivo">Persuasivo</option>
              <option value="Educativo">Educativo</option>
              <option value="Informal">Informal</option>
            </select>
          </div>

          <div class="campo-grupo">
            <label for="publicoEbook">Público:</label>
            <select id="publicoEbook">
              <option value="General" selected>General</option>
              <option value="Principiantes">Principiantes</option>
              <option value="Avanzado">Avanzado</option>
            </select>
          </div>
        </div>
      </div>

      <div class="botonera-acciones">
        <button onclick="crearProyecto()" class="btn btn-principal">Crear Proyecto</button>
        <button onclick="generarPlan2()" class="btn">Generar Plan</button>
        <button onclick="generarIndice()" class="btn">Índice</button>
        <button onclick="generarLegales()" class="btn">Legales</button>
        <button onclick="generarIntroduccion()" class="btn">Introducción</button>
        <button onclick="generarCapitulos()" class="btn">Capítulos</button>
        <button onclick="generarConclusion()" class="btn">Conclusión</button>
      </div>

    </section>

    <!-- 3. EDITOR (Oculto temporalmente) -->
    <div id="seccion-editor" class="modulo-editor" style="display: none;">
      <div class="editor-toolbar-editor">
        <button class="editor-menu">Portada</button>
      </div>
      <div id="paginaEditor"></div>
    </div>

  </main>

  <!-- FOOTER ORIGINAL -->
  <footer class="footer-principal">
    <p>PIXELLAB Studio &copy; 2026</p>
  </footer>

  <!-- CARGA DE SCRIPTS EN ORDEN EXACTO DE DEPENDENCIAS -->
  <script src="pixellab45-core.js"></script>
  <script src="generador.js"></script>
  <script src="editor.js"></script>
  <script src="app.js"></script>

</body>
</html>
