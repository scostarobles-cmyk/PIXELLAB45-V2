- name: Install Wrangler
  run: npm install -g wrangler

- name: Authenticate
  run: wrangler login --token ${{ secrets.CLOUDFLARE_API_TOKEN }}

- name: Deploy
  run: wrangler deploy
      - name: Deploy Worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
